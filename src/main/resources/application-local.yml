spring:
  datasource:
    url: jdbc:h2:file:./data/mahjong-omakase
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: false

server:
  port: 8080
  address: 0.0.0.0

app:
  cors:
    allowed-origins: http://localhost:5173
